<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login – Ahsan Ullah Food Point</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="../css/login.css"/>
  <meta name="description" content="View the Admin Login – Ahsan Ullah Food Point at Ahsan Ullah Food Point Okara. Order fresh and delicious fast food online."/>
  <link rel="canonical" href="https://ahsanullahfoodpoint.vercel.app/pages/login.html"/>
  <link rel="icon" type="image/png" href="../Assets/logo/logo.png" />
</head>
<body>
<div class="bg-pattern"></div>

<div class="login-card">
  <!-- Logo -->
  <div class="logo-area">
    <div class="logo-icon"><img src="../Assets/logo/logo.png" alt="Ahsan Ullah" style="width:42px;height:42px;object-fit:contain;border-radius:8px;" /></div>
    <span class="brand-name">Ahsan Ullah</span>
    <span class="brand-sub">Food Point</span>
    <span class="panel-badge">Admin Panel</span>
  </div>

  <h1>Welcome Back</h1>
  <p class="subtitle">Sign in to manage your restaurant</p>

  <!-- Error message -->
  <div class="error-msg" id="error-msg">
    <i class="fas fa-exclamation-triangle mr-2"></i>
    <span id="error-text">Invalid credentials. Please try again.</span>
  </div>

  <!-- Login Form -->
  <div class="form-group">
    <label>Email Address</label>
    <div class="input-wrap">
      <i class="fas fa-envelope"></i>
      <input type="email" id="email-input" placeholder="admin@aufp.com" autocomplete="email" />
    </div>
  </div>

  <div class="form-group">
    <label>Password</label>
    <div class="input-wrap">
      <i class="fas fa-lock"></i>
      <input type="password" id="pw-input" placeholder="Enter your password" autocomplete="current-password" id="password-input"/>
      <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Show password">
        <i class="fas fa-eye" id="eye-icon"></i>
      </button>
    </div>
  </div>

  <button class="btn-login" id="login-btn">
    <span class="spinner"></span>
    <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Sign In</span>
  </button>

  <!-- Setup info box -->
  <div class="info-box">
    <p><strong>First time setup?</strong> Configure Firebase in <code>js/firebase-config.js</code>, then create an admin user in Firebase Console → Authentication → Users.</p>
  </div>

  <a href="../index.html" class="back-link">
    <i class="fas fa-arrow-left mr-1"></i> Back to Website
  </a>
</div>

<!-- Firebase SDKs (Compat version) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="../Admin/firebase-config.js"></script>
<script>
  // Check if Firebase config has real credentials (not placeholders)
  var firebaseOk = false;
  var _apiKey = (typeof FIREBASE_CONFIG !== 'undefined' && FIREBASE_CONFIG.apiKey) || '';
  var _configIsReal = _apiKey.length > 20
    && _apiKey.indexOf('YOUR_API_KEY') === -1
    && _apiKey.indexOf('XXXXXXX') === -1;

  if (_configIsReal) {
    try {
      if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      firebaseOk = true;
    } catch(e) { console.warn('Firebase not configured:', e.message); }
  } else {
    console.info('[AUFP] Demo mode — placeholder Firebase config detected. Update Admin/firebase-config.js to enable Firebase.');
  }

  // Toggle password visibility
  document.getElementById('toggle-pw').addEventListener('click', function(){
    var inp = document.getElementById('pw-input');
    var icon = document.getElementById('eye-icon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      inp.type = 'password';
      icon.className = 'fas fa-eye';
    }
  });

  // Enter key login
  document.getElementById('pw-input').addEventListener('keydown', function(e){
    if (e.key === 'Enter') doLogin();
  });

  // Login button
  document.getElementById('login-btn').addEventListener('click', doLogin);

  function showError(msg) {
    var el = document.getElementById('error-msg');
    document.getElementById('error-text').textContent = msg;
    el.classList.add('show');
    setTimeout(function(){ el.classList.remove('show'); }, 4000);
  }

  function doLogin() {
    var email = document.getElementById('email-input').value.trim();
    var pw    = document.getElementById('pw-input').value;
    var btn   = document.getElementById('login-btn');

    if (!email || !pw) { showError('Please enter email and password.'); return; }

    btn.classList.add('loading');
    btn.disabled = true;

    if (!firebaseOk) {
      // DEMO MODE — bypass Firebase if not configured
      setTimeout(function(){
        if (email === 'admin@aufp.com' && pw === 'AhsanAdmin@2026') {
          sessionStorage.setItem('aufp_admin', 'demo');
          sessionStorage.setItem('aufp_admin_email', email);
          window.location.href = '../Admin/admin-panel.html';
        } else {
          btn.classList.remove('loading'); btn.disabled = false;
          showError('Demo credentials: admin@aufp.com / AhsanFoodPoint123!');
        }
      }, 800);
      return;
    }

    firebase.auth().signInWithEmailAndPassword(email, pw)
      .then(function(cred) {
        sessionStorage.setItem('aufp_admin', cred.user.uid);
        sessionStorage.setItem('aufp_admin_email', cred.user.email);
        window.location.href = '../Admin/admin-panel.html';
      })
      .catch(function(err) {
        btn.classList.remove('loading'); btn.disabled = false;
        var msgs = {
          'auth/user-not-found':     'No admin account found with this email.',
          'auth/wrong-password':     'Incorrect password. Please try again.',
          'auth/invalid-email':      'Invalid email address format.',
          'auth/too-many-requests':  'Too many attempts. Please wait and try again.',
          'auth/network-request-failed': 'Network error. Check your internet connection.'
        };
        showError(msgs[err.code] || 'Login failed: ' + err.message);
      });
  }

  // If already logged in, redirect
  if (sessionStorage.getItem('aufp_admin')) {
    window.location.href = '../Admin/admin-panel.html';
  }
</script>
</body>
</html>
